services:
  - type: web
    name: chemistry-model
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: REPORT_STORAGE_MODE
        value: google_form
      - key: GOOGLE_FORM_ACTION_URL
        sync: false
      - key: GOOGLE_FORM_ENTRY_MOLECULE
        sync: false
      - key: GOOGLE_FORM_ENTRY_TYPE
        sync: false
      - key: GOOGLE_FORM_ENTRY_MESSAGE
        sync: false
      - key: GOOGLE_FORM_ENTRY_CONTACT
        sync: false
      - key: GOOGLE_FORM_ENTRY_PAGE_URL
        sync: false
      - key: GOOGLE_FORM_ENTRY_USER_AGENT
        sync: false
